name: terracotta

services:
  terracotta:
    image: ghcr.io/hyunaeee/terracotta:${TERRACOTTA_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TERRACOTTA_BIND:-127.0.0.1}:${TERRACOTTA_PORT:-3000}:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      HIGGSFIELD_MCP_CONNECTED: ${HIGGSFIELD_MCP_CONNECTED:-false}
      TERRACOTTA_MONTHLY_BUDGET_USD: ${TERRACOTTA_MONTHLY_BUDGET_USD:-24}
      MCP_TOKEN_ENCRYPTION_KEY: ${MCP_TOKEN_ENCRYPTION_KEY:-}
      TERRACOTTA_SELF_HOSTED: "true"
    volumes:
      - terracotta-data:/data

volumes:
  terracotta-data:
    name: ${TERRACOTTA_DATA_VOLUME:-terracotta-data}
